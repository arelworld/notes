<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arl Note</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

 <link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">


</head>
<body>

<div class="toolbar">

    <button onclick="format('bold')"><b>B</b></button>

    <button onclick="format('underline')">
        <u>U</u>
    </button>

    <button onclick="highlightText()">
        🖍️
    </button>

    <input type="color"
           id="highlightColor"
           value="#fff59d"
           title="Highlight Color">

    <select id="fontPicker">
        <option value="Poppins">Poppins</option>
        <option value="Arial">Arial</option>
        <option value="Roboto">Roboto</option>
        <option value="Playfair Display">Playfair Display</option>
    </select>

    <select id="fontSize">
        <option value="12">12px</option>
        <option value="14">14px</option>
        <option value="16">16px</option>
        <option value="18" selected>18px</option>
        <option value="20">20px</option>
        <option value="24">24px</option>
        <option value="30">30px</option>
        <option value="36">36px</option>
    </select>

    <input type="color"
           id="fontColor"
           value="#111827"
           title="Text Color">

    <button onclick="toggleDark()">
        🌓
    </button>

    <button onclick="document.getElementById('imgInput').click()">
        📷
    </button>

    <button class="saveBtn"
            onclick="saveImage()">
        Save HD
    </button>

</div>

<div id="note" contenteditable="true">
    <h2>My Note</h2>
    <p>Start typing here...</p>
</div>

<div class="status" id="status">
    Saved
</div>

<input type="file"
       id="imgInput"
       hidden
       accept="image/*">


<script src="script.js"></script>
</body>
</html>
