<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Ninja</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#d8e2dc;
    font-family:Arial,sans-serif;
}

.top-bar{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;

    display:flex;
    gap:15px;
    align-items:center;

    padding:12px 18px;
    border-radius:20px;

    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
}

.upload-btn{
    background:#7d9d8c;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

#score{
    color:#3f5f4f;
    font-weight:bold;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div class="top-bar">
    <label class="upload-btn">
        Upload Photos
        <input type="file" id="imageInput" accept="image/*" multiple hidden>
    </label>

    <div id="score">Score: 0</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let uploadedImages = [];
let flyingItems = [];
let particles = [];
let trail = [];

class FlyingImage{
    constructor(img){

        this.img = img;

        this.size = 100;

        this.x = Math.random() * (canvas.width - this.size);

        this.y = canvas.height + this.size;

        this.vx = (Math.random() - 0.5) * 5;

        this.vy = -(12 + Math.random() * 8);

        this.gravity = 0.18;

        this.rotation = Math.random() * Math.PI;

        this.rotationSpeed = (Math.random()-0.5)*0.1;
    }

    update(){
        this.vy += this.gravity;

        this.x += this.vx;
        this.y += this.vy;

        this.rotation += this.rotationSpeed;
    }

    draw(){

        ctx.save();

        ctx.translate(
            this.x + this.size/2,
            this.y + this.size/2
        );

        ctx.rotate(this.rotation);

        ctx.drawImage(
            this.img,
            -this.size/2,
            -this.size/2,
            this.size,
            this.size
        );

        ctx.restore();
    }
}

class Particle{
    constructor(x,y){

        this.x = x;
        this.y = y;

        this.vx = (Math.random()-0.5)*8;
        this.vy = (Math.random()-0.5)*8;

        this.life = 30;

        this.size = Math.random()*8+2;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }

    draw(){

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fillStyle="#7d9d8c";
        ctx.fill();
    }
}

document
.getElementById("imageInput")
.addEventListener("change",(e)=>{

    uploadedImages=[];

    for(const file of e.target.files){

        const reader = new FileReader();

        reader.onload=(ev)=>{

            const img = new Image();

            img.onload=()=>{
                uploadedImages.push(img);
            };

            img.src = ev.target.result;
        };

        reader.readAsDataURL(file);
    }
});

function spawnImage(){

    if(uploadedImages.length===0) return;

    const img =
        uploadedImages[
            Math.floor(Math.random()*uploadedImages.length)
        ];

    flyingItems.push(new FlyingImage(img));
}

setInterval(spawnImage,1000);

function vibrate(){

    if(navigator.vibrate){
        navigator.vibrate(15);
    }
}

function createParticles(x,y){

    for(let i=0;i<20;i++){
        particles.push(new Particle(x,y));
    }

    vibrate();
}

function sliceCheck(x,y){

    for(let i=flyingItems.length-1;i>=0;i--){

        const item = flyingItems[i];

        if(
            x > item.x &&
            x < item.x + item.size &&
            y > item.y &&
            y < item.y + item.size
        ){

            createParticles(x,y);

            score++;

            document.getElementById("score").innerText =
                "Score: " + score;

            flyingItems.splice(i,1);
        }
    }
}

function movePointer(x,y){

    trail.push({x,y});

    if(trail.length>15){
        trail.shift();
    }

    sliceCheck(x,y);
}

canvas.addEventListener("mousemove",(e)=>{
    movePointer(e.clientX,e.clientY);
});

canvas.addEventListener("touchmove",(e)=>{

    e.preventDefault();

    const touch = e.touches[0];

    movePointer(
        touch.clientX,
        touch.clientY
    );

},{passive:false});

function drawTrail(){

    if(trail.length<2) return;

    ctx.beginPath();

    ctx.moveTo(trail[0].x,trail[0].y);

    for(const point of trail){
        ctx.lineTo(point.x,point.y);
    }

    ctx.strokeStyle="#557c69";
    ctx.lineWidth=6;
    ctx.lineCap="round";

    ctx.shadowBlur=15;
    ctx.shadowColor="#557c69";

    ctx.stroke();

    ctx.shadowBlur=0;
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=flyingItems.length-1;i>=0;i--){

        flyingItems[i].update();
        flyingItems[i].draw();

        if(flyingItems[i].y > canvas.height + 200){
            flyingItems.splice(i,1);
        }
    }

    for(let i=particles.length-1;i>=0;i--){

        particles[i].update();
        particles[i].draw();

        if(particles[i].life<=0){
            particles.splice(i,1);
        }
    }

    drawTrail();

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
